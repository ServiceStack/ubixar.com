# Name of your application. Used to uniquely configure containers.
service: ubixar

# Name of the container image.
image: servicestack/ubixar.com
  
<% require "dotenv"; Dotenv.load(".env") %>
# Environment variables to set in the container.
env:
  clear:
    ASPNETCORE_FORWARDEDHEADERS_ENABLED: true # Required for use of ASP.NET Core with Kamal-Proxy.
  secret:
    - COMFY_DB_CONNECTION

# Deploy to these servers.
servers:
  # IP address of server, optionally use env variable.
  web:
    - 5.78.128.205
#   - <%= ENV['KAMAL_DEPLOY_IP'] %>


# Enable SSL auto certification via Let's Encrypt (and allow for multiple apps on one server).
# If using something like Cloudflare, it is recommended to set encryption mode
# in Cloudflare's SSL/TLS setting to "Full" to enable end-to-end encryption.
proxy:
  ssl: true
  hosts:
    - ubixar.com
    - www.ubixar.com
    - cdn.ubixar.com
    - ai.llmspy.org
  # kamal-proxy connects to your container over port 80, use `app_port` to specify a different port.
  app_port: 8080
  forward_headers: true
  # Disable buffering to support streaming responses.
  buffering:
    requests: false
    responses: false
  # Response timeout in seconds.
  response_timeout: 600

# Credentials for your image host.
registry:
  # Specify the registry server, if you're not using Docker Hub
  server: ghcr.io
  username:
    - KAMAL_REGISTRY_USERNAME

  # Always use an access token rather than real password (pulled from .kamal/secrets).
  password:
    - KAMAL_REGISTRY_PASSWORD

# Configure builder setup
builder:
  arch: amd64

volumes:
  - "/opt/docker/ubixar.com/App_Data:/app/App_Data"

# Kamal 2 automatically creates and uses the 'kamal' network
# No additional docker options needed for networking

accessories:
  postgres:
    # Always pin the major version. An unpinned `postgres` tracks :latest, which
    # silently rolled 17 -> 18 and took the DB down (it refuses to start against a
    # data dir from an older major). Bumping this is a migration, never a redeploy.
    image: postgres:18
    host: 5.78.128.205
    # Bound to loopback: reachable only via `tailscale serve --tcp 5432 tcp://127.0.0.1:5434`,
    # never from the public internet. Also avoids the wildcard-vs-tailscaled bind conflict on 5432.
    # NOTE: this is the *host* port only — app containers connect over the `kamal`
    # network to ubixar-postgres:5432, so COMFY_DB_CONNECTION must keep Port=5432.
    port: "127.0.0.1:5434:5432"
    env:
      clear:
        POSTGRES_USER: postgres
        POSTGRES_DB: ubixar
        DB_HOST: 0.0.0.0
        DB_PORT: 5432
      secret:
        - POSTGRES_PASSWORD
    directories:
      # PG18+ layout: mount the PARENT dir; the image puts data in a
      # major-version subdir (PGDATA=/var/lib/postgresql/18/docker). The old PG17
      # dir (.../postgres -> /var/lib/postgresql/data) is retained for rollback.
      - /opt/docker/ubixar.com/postgres18:/var/lib/postgresql
      # NOTE: /docker-entrypoint-initdb.d is deliberately NOT mounted. Those scripts
      # run against ANY empty data dir, and initdb.d holds a 534MB Sept-2025 dump —
      # mounting it here would silently restore a stale snapshot over a new cluster.
  backup:
    image: ghcr.io/servicestack/backup-postgres:latest
    host: 5.78.128.205
    env:
      clear:
        POSTGRES_HOST: ubixar-postgres
        POSTGRES_USER: postgres
        POSTGRES_DB: ubixar
        BACKUP_INTERVAL: 86400  # 24 hours
        RETENTION_DAYS: 7       # Keep local backups for 7 days
        S3_RETENTION_DAYS: 30   # Keep S3 backups for 30 days
        S3_BUCKET: backups
        S3_PREFIX: ubixar
        AWS_DEFAULT_REGION: auto
      secret:
        - POSTGRES_PASSWORD
        - AWS_ACCESS_KEY_ID
        - AWS_SECRET_ACCESS_KEY
        - AWS_ENDPOINT_URL
    directories:
      - /opt/docker/ubixar.com/backups:/backups

